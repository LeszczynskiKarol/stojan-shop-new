# ============================================
# /etc/nginx/conf.d/silniki-elektryczne.com.pl.conf
# silniki-elektryczne.com.pl — Astro SSR + Fastify
# Stojan Shop v2 (2026)
# ============================================

# --- HTTP → HTTPS redirect (all domains) ---
server {
    listen 80;
    server_name silniki-elektryczne.com.pl www.silniki-elektryczne.com.pl;
    return 301 https://www.silniki-elektryczne.com.pl$request_uri;
}

# --- HTTPS bez www → HTTPS www ---
server {
    listen 443 ssl;
    server_name silniki-elektryczne.com.pl;

    ssl_certificate /etc/letsencrypt/live/silniki-elektryczne.com.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silniki-elektryczne.com.pl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.silniki-elektryczne.com.pl$request_uri;
}

# ============================================
# GŁÓWNA KONFIGURACJA HTTPS (www)
# ============================================
server {
    listen 443 ssl;
    server_name www.silniki-elektryczne.com.pl;

    ssl_certificate /etc/letsencrypt/live/silniki-elektryczne.com.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silniki-elektryczne.com.pl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ============================================
    # SECURITY HEADERS
    # ============================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ============================================
    # CORS (mirror Fastify: origin: true, credentials: true)
    # ============================================
    set $cors_origin "";
    if ($http_origin) {
        set $cors_origin $http_origin;
    }

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With, Cookie" always;
    add_header Access-Control-Max-Age "86400" always;

    # Preflight OPTIONS — natychmiastowa odpowiedź (nie trafia do backendu)
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # ============================================
    # BLOKUJ ?add-to-cart= (stary WooCommerce pattern)
    # Google zaindeksował ~20 takich URL-i
    # ============================================
    if ($args ~* "add-to-cart=") {
        return 301 $uri;
    }

    # ============================================
    # PRZEKIEROWANIA SEO (stary sklep → nowy)
    # Zachowujemy wszystkie 301 żeby nie stracić pozycji
    # ============================================

    # --- Stary /shop → nowy /sklep ---
    rewrite ^/shop(/.*)?$ /sklep$1 permanent;

    # --- /legal/skup-silnikow → /skup-silnikow ---
    rewrite ^/legal/skup-silnikow/?$ /skup-silnikow permanent;

    # --- Blog: /baza-wiedzy → /blog ---
    rewrite ^/baza-wiedzy/?$ /blog/ permanent;

    # --- Blog: stare URL-e na root → /blog/ prefix ---
    rewrite ^/konserwacja-silnika-elektrycznego-jak-zadbac-o-naped-aby-sluzyl-sprawnie-i-dlugo/?$ /blog/konserwacja-silnika-elektrycznego-jak-zadbac-o-naped-aby-sluzyl-sprawnie-i-dlugo/ permanent;
    rewrite ^/wybor-silnika-elektrycznego-indukcyjnego/?$ /blog/wybor-silnika-elektrycznego-indukcyjnego/ permanent;
    rewrite ^/historia-produkcji-silnikow-i-maszyn-elektrycznych-w-polsce/?$ /blog/historia-produkcji-silnikow-i-maszyn-elektrycznych-w-polsce/ permanent;
    rewrite ^/tabliczka-znamionowa-silnika-elektrycznego-3fazowego-opis-co-mozna-z-niej-wyczytac/?$ /blog/tabliczka-znamionowa-silnika-elektrycznego-3fazowego-opis-co-mozna-z-niej-wyczytac/ permanent;
    rewrite ^/przyszlosc-rynku-silnikow-elektrycznych-dane-i-prognozy/?$ /blog/przyszlosc-rynku-silnikow-elektrycznych-dane-i-prognozy/ permanent;
    rewrite ^/historia-silnikow-elektrycznych/?$ /blog/historia-silnikow-elektrycznych/ permanent;
    rewrite ^/budowa-silnika-elektrycznego/?$ /blog/budowa-silnika-elektrycznego/ permanent;
    rewrite ^/jak-dziala-silnik-elektryczny/?$ /blog/jak-dziala-silnik-elektryczny/ permanent;

    # --- Kategorie: /silniki-elektryczne/ prefix → bezpośrednie ---
    rewrite ^/silniki-elektryczne/?$ / permanent;
    rewrite ^/silniki-elektryczne/trojfazowe/?$ /trojfazowe/ permanent;
    rewrite ^/silniki-elektryczne/pierscieniowe/?$ /pierscieniowe/ permanent;
    rewrite ^/silniki-elektryczne/dwubiegowe/?$ /dwubiegowe/ permanent;
    rewrite ^/silniki-elektryczne/jednofazowe/?$ /jednofazowe/ permanent;
    rewrite ^/silniki-elektryczne/z-hamulcem/?$ /z-hamulcem/ permanent;
    rewrite ^/silniki-elektryczne/silniki-pierscieniowe/?$ /pierscieniowe/ permanent;
    rewrite ^/silniki-elektryczne/silniki-jednofazowe/?$ /jednofazowe/ permanent;
    rewrite ^/silniki-elektryczne/silniki-trojfazowe/?$ /trojfazowe/ permanent;
    rewrite ^/silniki-elektryczne/silniki-elektryczne-dwubiegowe/?$ /dwubiegowe/ permanent;
    rewrite ^/silniki-elektryczne-trojfazowe/?$ /trojfazowe/ permanent;

    # --- Kategorie: stare aliasy → kanoniczne ---
    rewrite ^/silniki-jednofazowe/(.*)$ /jednofazowe/$1 permanent;
    rewrite ^/silniki-dwubiegowe/(.*)$ /dwubiegowe/$1 permanent;
    rewrite ^/silniki-elektryczne-dwubiegowe/(.*)$ /dwubiegowe/$1 permanent;
    rewrite ^/silniki-pierscieniowe/(.*)$ /pierscieniowe/$1 permanent;
    rewrite ^/silniki-elektryczne-pierscieniowe/(.*)$ /pierscieniowe/$1 permanent;
    rewrite ^/silniki-elektryczne-z-hamulce/(.*)$ /z-hamulcem/$1 permanent;
    rewrite ^/silniki-z-hamulcem/(.*)$ /z-hamulcem/$1 permanent;
    rewrite ^/silniki-elektryczne-trojfazowe/(.*)$ /trojfazowe/$1 permanent;
    rewrite ^/wentylatory-do-silnikow-elektrycznych/?$ /wentylatory-przemyslowe/ permanent;

    # --- Paginacja starego sklepu ---
    rewrite ^/shop/page/[0-9]+/?$ /sklep permanent;

    # --- Pompy: /silniki-elektryczne/pompa-* → /pompy/pompa-* ---
    rewrite ^/silniki-elektryczne/(pompa-.*)$ /pompy/$1 permanent;

    # --- Pompy: /trojfazowe/pompa-* → /pompy/pompa-* ---
    rewrite ^/trojfazowe/(pompa-.*)$ /pompy/$1 permanent;

    # --- Pompy: /jednofazowe/pompa-* → /pompy/pompa-* ---
    rewrite ^/jednofazowe/(pompa-.*)$ /pompy/$1 permanent;

    # --- Catch-all: pozostałe produkty pod /silniki-elektryczne/ ---
    # (produkty które nie pasują do powyższych reguł)
    rewrite ^/silniki-elektryczne/(.+)$ /$1 permanent;

    # ============================================
    # ROBOTS.TXT — serwowany z pliku
    # ============================================
    location = /robots.txt {
        alias /home/ec2-user/stojan-shop-new/frontend/public/robots.txt;
        access_log off;
    }

    # ============================================
    # API → Fastify backend (port 4000)
    # ============================================
    location /api {
        client_max_body_size 50M;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_request_buffering off;

        # Stripe webhook needs raw body — disable buffering
        proxy_buffering off;
    }

    # ============================================
    # ASTRO STATIC ASSETS — agresywne cache
    # ============================================
    location /_astro/ {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Astro hashed assets — cache 1 rok
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================
    # STATIC FILES — images, fonts, etc.
    # ============================================
    location ~* \.(jpg|jpeg|png|webp|gif|svg|ico|woff|woff2|ttf|eot|css|js)$ {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ============================================
    # SITEMAP — proxy do backend
    # ============================================
    location ~ ^/sitemap.*\.xml$ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 1h;
    }

    # Google Merchant Feed
    location = /google-merchant-feed.xml {
        proxy_pass http://127.0.0.1:4000/api/google-merchant-feed;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # EVERYTHING ELSE → Astro SSR (port 3000)
    # ============================================
    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}