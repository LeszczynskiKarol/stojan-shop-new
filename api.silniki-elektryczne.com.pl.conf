# ============================================
# api.silniki-elektryczne.com.pl → Fastify (port 4000)
# /etc/nginx/conf.d/api.silniki-elektryczne.com.pl.conf
# ============================================

server {
    listen 80;
    server_name api.silniki-elektryczne.com.pl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.silniki-elektryczne.com.pl;

    ssl_certificate /etc/letsencrypt/live/silniki-elektryczne.com.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silniki-elektryczne.com.pl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # CORS (mirror Fastify: origin: true, credentials: true)
    set $cors_origin "";
    if ($http_origin) {
        set $cors_origin $http_origin;
    }

    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, X-Requested-With, Cookie" always;
    add_header Access-Control-Max-Age "86400" always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_request_buffering off;
    }
}