name: Deploy Stojan

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STOJAN_HOST }}
          username: ec2-user
          key: ${{ secrets.STOJAN_SSH_KEY }}
          command_timeout: 300s
          script: |
            cd /home/ec2-user/stojan-shop-new

            echo "=== Git pull ==="
            git pull origin main

            echo "=== Backend ==="
            cd backend
            npm ci --production
            npx prisma migrate deploy
            cd ..

            echo "=== Frontend ==="
            cd frontend
            npm ci
            npm run build
            cd ..

            echo "=== Restart PM2 ==="
            pm2 restart stojan-backend
            pm2 restart stojan-frontend

            echo "=== Done ==="
            pm2 list
