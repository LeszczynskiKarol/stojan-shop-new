- name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STOJAN_HOST }}
          username: ec2-user
          key: ${{ secrets.STOJAN_SSH_KEY }}
          command_timeout: 300s
          script: |
            cd /home/ec2-user/stojan-shop-new

            echo "=== Stop PM2 ==="
            pm2 stop stojan-backend || true
            pm2 stop stojan-frontend || true

            echo "=== Git pull ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Backend ==="
            cd backend
            rm -rf node_modules
            npm ci
            npm run build
            npx prisma migrate deploy
            cd ..

            echo "=== Frontend ==="
            cd frontend
            rm -rf node_modules
            npm ci
            npm run build
            cd ..

            echo "=== Start PM2 ==="
            pm2 start stojan-backend
            pm2 start stojan-frontend
            echo "=== Done ==="
            pm2 list
